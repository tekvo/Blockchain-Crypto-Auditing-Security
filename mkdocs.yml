site_name: Blockchain & Smart Contract Security
site_url: https://blockchain-sec.tekvo.io/
site_description: Curated notes on blockchain security, smart contract auditing, and token due diligence.
site_author: Tekvo.io
copyright: 'Guide by <a href="https://www.tekvo.io" target="_blank" rel="noopener noreferrer">Tekvo.io</a>'
repo_url: https://github.com/tekvo/Blockchain-Crypto-Auditing-Security
repo_name: GitHub

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.webp
  favicon: assets/favicon-16x16.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Industry:
      - Overview: industry/index.md
      - "Digital native & protocols":
          - "Web3, DeFi & protocol builders": industry/web3-blockchain-security.md
      - "Financial services & markets":
          - "Banking, payments & FinTech": industry/banking-payments-fintech.md
          - "Capital markets & tokenization": industry/capital-markets-tokenization.md
          - "Insurance": industry/insurance.md
      - "Supply chain & physical economy":
          - "Supply chain, logistics & trade": industry/supply-chain-logistics.md
          - "Manufacturing, IoT & industrial": industry/manufacturing-iot-industrial.md
          - "Agriculture & food systems": industry/agriculture-food.md
          - "Energy, sustainability & commodities": industry/energy-sustainability-commodities.md
      - "Public sector & regulated data":
          - "Government & public sector": industry/government-public-sector.md
          - "Healthcare & life sciences": industry/healthcare-life-sciences.md
          - "Telecom, identity & consumer data": industry/telecom-identity.md
      - "Consumer, media & built world":
          - "Retail, loyalty & consumer brands": industry/retail-consumer-brands.md
          - "Gaming, media & entertainment": industry/gaming-media-entertainment.md
          - "Real estate, construction & prop-tech": industry/real-estate-construction.md
          - "Transportation & mobility": industry/transportation-mobility.md
      - "Knowledge & professional services":
          - "Professional services, legal & IP": industry/professional-services-legal-ip.md
          - "Education, research & credentials": industry/education-research-credentials.md
  - Guides:
      - Types of blockchain attacks: guides/blockchain-attacks.md
      - Smart contract attacks: guides/smart-contract-attacks.md
      - Blockchain best practices: guides/blockchain-best-practices.md
      - Audit reports: guides/audit-reports.md
      - Web3 security tools: guides/web3-security-tools.md
      - EVM low-level coding: guides/evm-low-level-coding.md
      - Audit roadmap: guides/audit-roadmap.md
      - Token due diligence: guides/token-due-diligence.md
      - Secureum: guides/secureum.md
  - Code library:
      - Overview: code/index.md
      - Examples: code/examples.md
      - Interfaces & security: code/interfaces.md
      - Utils: code/utils.md
      - Guided walkthrough: code-samples.md

extra_css:
  - stylesheets/tekvo.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tekvo/Blockchain-Crypto-Auditing-Security
      name: Repository on GitHub
    - icon: fontawesome/solid/globe
      link: https://www.tekvo.io
      name: Tekvo.io

hooks:
  - mkdocs_hooks.py

plugins:
  - meta
  - search

markdown_extensions:
  - md_in_html
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - .
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
